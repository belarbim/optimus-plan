services:
  postgres:
    image: postgres:17
    container_name: optimus_postgres
    environment:
      POSTGRES_DB: optimus_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d optimus_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: optimus_adminer
    ports:
      - "8888:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
